<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presupuesto - Ferretería Javier</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 1rem; }
    .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 8px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .header { text-align: center; border-bottom: 2px solid #333; padding-bottom: 1rem; margin-bottom: 1rem; }
    .header h1 { font-size: 22px; letter-spacing: 2px; }
    .header p { font-size: 12px; color: #555; margin-top: 3px; }
    .meta { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 1rem; color: #333; flex-wrap: wrap; gap: 6px; }
    .cliente-input { border: 1px solid #ddd; border-radius: 4px; padding: 3px 6px; font-size: 13px; width: 160px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 1rem; }
    th { text-align: left; padding: 6px 4px; border-bottom: 1px solid #333; font-size: 12px; color: #555; }
    td { padding: 4px; vertical-align: middle; position: relative; }
    td input, td select { width: 100%; border: 1px solid #ddd; border-radius: 4px; padding: 4px 6px; font-size: 13px; }
    .total-row { font-weight: bold; font-size: 15px; text-align: right; padding: 8px 4px; border-top: 2px solid #333; }
    .btn-add { width: 100%; padding: 8px; border: 1px dashed #aaa; border-radius: 6px; background: transparent; color: #666; font-size: 13px; cursor: pointer; margin-bottom: 1rem; }
    .btn-add:hover { background: #f0f0f0; }
    .btn-remove { background: none; border: none; color: #aaa; cursor: pointer; font-size: 18px; }
    .btn-remove:hover { color: red; }
    .actions { display: flex; gap: 8px; }
    .btn { flex: 1; padding: 10px; border-radius: 6px; font-size: 14px; cursor: pointer; font-weight: bold; border: none; }
    .btn-wpp { background: #25D366; color: white; }
    .btn-wpp:hover { background: #1ebe5d; }
    .btn-print { background: #333; color: white; }
    .btn-print:hover { background: #555; }
    .autocomplete { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #ddd; border-radius: 4px; z-index: 100; max-height: 150px; overflow-y: auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    .autocomplete-item { padding: 6px 10px; cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; }
    .autocomplete-item:hover { background: #f0f0f0; }
    .autocomplete-item span { color: #888; font-size: 12px; }
    .msg-guardado { font-size: 11px; color: green; text-align: center; margin-bottom: 8px; display: none; }
    @media print {
      @page { margin: 1cm; }
      body { background: white; padding: 0; }
      .container { box-shadow: none; }
      .btn-add, .actions, .btn-remove { display: none; }
      td input, td select, .cliente-input { border: none; background: transparent; appearance: none; }
      input::placeholder { color: transparent; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>FERRETERÍA JAVIER</h1>
      <p>Electricidad · Pinturería · Sanitarios</p>
      <p>Av. Avellaneda 3384 · Virreyes, Buenos Aires</p>
      <p>Cel: 11 6402-6088</p>
    </div>

    <div class="meta">
      <span>Presupuesto N° <strong id="num">0001</strong></span>
      <span>Fecha: <strong id="fecha"></strong></span>
      <span>Señor/a: <input type="text" class="cliente-input" placeholder="Nombre del cliente" /></span>
    </div>

    <p class="msg-guardado" id="msg-guardado">✓ Producto guardado</p>

    <table>
      <thead>
        <tr>
          <th style="width:55px">Cant.</th>
          <th style="width:75px">Unidad</th>
          <th>Descripción</th>
          <th style="width:85px">Precio u.</th>
          <th style="width:80px;text-align:right">Total</th>
          <th style="width:24px"></th>
        </tr>
      </thead>
      <tbody id="items"></tbody>
      <tfoot>
        <tr>
          <td colspan="4" class="total-row">TOTAL $</td>
          <td class="total-row" id="total" style="text-align:right">0,00</td>
          <td></td>
        </tr>
      </tfoot>
    </table>

    <button class="btn-add" onclick="agregarItem()">+ Agregar ítem</button>

    <div class="actions">
      <button class="btn btn-wpp" onclick="enviarWpp()">WhatsApp</button>
      <button class="btn btn-print" onclick="window.print()">Imprimir</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, query, where, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBn6pAL_PAgGPIVAijSKKwolLTseYqf1JQ",
      authDomain: "ferreteria-javier-f58f0.firebaseapp.com",
      projectId: "ferreteria-javier-f58f0",
      storageBucket: "ferreteria-javier-f58f0.firebasestorage.app",
      messagingSenderId: "1068170818412",
      appId: "1:1068170818412:web:4affc30dcdfdff40ef3949"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const UNIDADES = ['unid.', 'metros', 'litros', 'kg', 'cjs', 'tira/s', 'rollos'];

    document.getElementById('fecha').textContent = new Date().toLocaleDateString('es-AR', {
      day: '2-digit', month: '2-digit', year: 'numeric'
    });

    let productosCache = [];

    async function cargarProductos() {
      const snap = await getDocs(collection(db, "productos"));
      productosCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    }

    await cargarProductos();

    function mostrarGuardado() {
      const msg = document.getElementById('msg-guardado');
      msg.style.display = 'block';
      setTimeout(() => msg.style.display = 'none', 2000);
    }

    window.agregarItem = function() {
      const tbody = document.getElementById('items');
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><input type="number" min="0" value="1" oninput="calcular()" /></td>
        <td><select oninput="calcular()">${UNIDADES.map(u => `<option>${u}</option>`).join('')}</select></td>
        <td style="position:relative">
          <input type="text" placeholder="Descripción del producto" class="desc-input" />
          <div class="autocomplete" style="display:none"></div>
        </td>
        <td><input type="number" min="0" placeholder="0" oninput="calcular()" class="precio-input" /></td>
        <td style="text-align:right" class="subtotal">0,00</td>
        <td><button class="btn-remove" onclick="this.closest('tr').remove();calcular()">×</button></td>
      `;
      tbody.appendChild(tr);

      const descInput = tr.querySelector('.desc-input');
      const precioInput = tr.querySelector('.precio-input');
      const autocomplete = tr.querySelector('.autocomplete');

      descInput.addEventListener('input', () => {
        const val = descInput.value.toLowerCase().trim();
        if (val.length < 2) { autocomplete.style.display = 'none'; return; }
        const matches = productosCache.filter(p => p.nombre.toLowerCase().includes(val));
        if (matches.length === 0) { autocomplete.style.display = 'none'; return; }
        autocomplete.innerHTML = matches.map(p =>
          `<div class="autocomplete-item" data-nombre="${p.nombre}" data-precio="${p.precio}">
            ${p.nombre} <span>$${Number(p.precio).toLocaleString('es-AR')}</span>
          </div>`
        ).join('');
        autocomplete.style.display = 'block';
        autocomplete.querySelectorAll('.autocomplete-item').forEach(item => {
          item.addEventListener('click', () => {
            descInput.value = item.dataset.nombre;
            precioInput.value = item.dataset.precio;
            autocomplete.style.display = 'none';
            calcular();
          });
        });
      });

      descInput.addEventListener('blur', () => {
        setTimeout(async () => {
          autocomplete.style.display = 'none';
          const nombre = descInput.value.trim();
          const precio = parseFloat(precioInput.value);
          if (!nombre || !precio) return;
          const existe = productosCache.find(p => p.nombre.toLowerCase() === nombre.toLowerCase());
          if (!existe) {
            await addDoc(collection(db, "productos"), { nombre, precio });
            await cargarProductos();
            mostrarGuardado();
          } else if (existe.precio !== precio) {
            await updateDoc(doc(db, "productos", existe.id), { precio });
            await cargarProductos();
            mostrarGuardado();
          }
        }, 200);
      });

      calcular();
    }

    window.calcular = function() {
      let total = 0;
      document.querySelectorAll('#items tr').forEach(tr => {
        const cant = parseFloat(tr.cells[0].querySelector('input').value) || 0;
        const precio = parseFloat(tr.cells[3].querySelector('input').value) || 0;
        const sub = cant * precio;
        tr.querySelector('.subtotal').textContent = formatear(sub);
        total += sub;
      });
      document.getElementById('total').textContent = formatear(total);
    }

    function formatear(n) {
      return n.toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    window.enviarWpp = function() {
      const fecha = document.getElementById('fecha').textContent;
      const num = document.getElementById('num').textContent;
      const cliente = document.querySelector('.cliente-input').value || '';
      let msg = `*FERRETERÍA JAVIER*\nPresupuesto N° ${num} - ${fecha}`;
      if (cliente) msg += `\nSr/a: ${cliente}`;
      msg += '\n\n';
      document.querySelectorAll('#items tr').forEach(tr => {
        const cant = tr.cells[0].querySelector('input').value;
        const unit = tr.cells[1].querySelector('select').value;
        const desc = tr.cells[2].querySelector('input').value;
        const precio = parseFloat(tr.cells[3].querySelector('input').value) || 0;
        const sub = (parseFloat(cant) || 0) * precio;
        if (desc) msg += `• ${cant} ${unit} ${desc} → $${formatear(sub)}\n`;
      });
      msg += `\n*TOTAL: $${document.getElementById('total').textContent}*`;
      window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
    }

    agregarItem();
    agregarItem();
  </script>
</body>
</html>
