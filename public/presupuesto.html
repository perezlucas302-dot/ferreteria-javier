<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presupuesto - Ferretería Javier</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 1rem; }
    .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 8px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .header { text-align: center; border-bottom: 2px solid #333; padding-bottom: 1rem; margin-bottom: 1rem; }
    .header h1 { font-size: 22px; letter-spacing: 2px; }
    .header p { font-size: 12px; color: #555; margin-top: 3px; }
    .meta { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 1rem; color: #333; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 1rem; }
    th { text-align: left; padding: 6px 4px; border-bottom: 1px solid #333; font-size: 12px; color: #555; }
    td { padding: 4px; vertical-align: middle; }
    td input, td select { width: 100%; border: 1px solid #ddd; border-radius: 4px; padding: 4px 6px; font-size: 13px; }
    .total-row { font-weight: bold; font-size: 15px; text-align: right; padding: 8px 4px; border-top: 2px solid #333; }
    .btn-add { width: 100%; padding: 8px; border: 1px dashed #aaa; border-radius: 6px; background: transparent; color: #666; font-size: 13px; cursor: pointer; margin-bottom: 1rem; }
    .btn-add:hover { background: #f0f0f0; }
    .btn-remove { background: none; border: none; color: #aaa; cursor: pointer; font-size: 18px; }
    .btn-remove:hover { color: red; }
    .actions { display: flex; gap: 8px; }
    .btn { flex: 1; padding: 10px; border-radius: 6px; font-size: 14px; cursor: pointer; font-weight: bold; border: none; }
    .btn-wpp { background: #25D366; color: white; }
    .btn-wpp:hover { background: #1ebe5d; }
    .btn-print { background: #333; color: white; }
    .btn-print:hover { background: #555; }
    @media print {
      @page { margin: 1cm; }
      body { background: white; padding: 0; }
      .container { box-shadow: none; }
      .btn-add, .actions, .btn-remove { display: none; }
      td input, td select, .cliente-input { border: none; background: transparent; appearance: none; }
input::placeholder { color: transparent; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>FERRETERÍA JAVIER</h1>
      <p>Electricidad · Pinturería · Sanitarios</p>
      <p>Av. Avellaneda 3384 · Virreyes, Buenos Aires</p>
      <p>Cel: 11 6402-6088</p>
    </div>

    <div class="meta">
      <span>Presupuesto N° <strong id="num">0001</strong></span>
      <span>Fecha: <strong id="fecha"></strong></span>
      <span>Señ@r/a: <input type="text" class="cliente-input" placeholder="Nombre del cliente" /></span>
    </div>

    <table>
      <thead>
        <tr>
          <th style="width:55px">Cant.</th>
          <th style="width:75px">Unidad</th>
          <th>Descripción</th>
          <th style="width:85px">Precio u.</th>
          <th style="width:80px;text-align:right">Total</th>
          <th style="width:24px"></th>
        </tr>
      </thead>
      <tbody id="items"></tbody>
      <tfoot>
        <tr>
          <td colspan="4" class="total-row">TOTAL $</td>
          <td class="total-row" id="total" style="text-align:right">0,00</td>
          <td></td>
        </tr>
      </tfoot>
    </table>

    <button class="btn-add" onclick="agregarItem()">+ Agregar ítem</button>

    <div class="actions">
      <button class="btn btn-wpp" onclick="enviarWpp()">WhatsApp</button>
      <button class="btn btn-print" onclick="window.print()">Imprimir</button>
    </div>
  </div>

  <script>
    const UNIDADES = ['unid.', 'metros', 'litros', 'kg', 'cjs', 'tira/s', 'rollos'];

    document.getElementById('fecha').textContent = new Date().toLocaleDateString('es-AR', {
      day: '2-digit', month: '2-digit', year: 'numeric'
    });

    function agregarItem() {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><input type="number" min="0" value="1" oninput="calcular()" /></td>
        <td><select oninput="calcular()">${UNIDADES.map(u => `<option>${u}</option>`).join('')}</select></td>
        <td><input type="text" placeholder="Descripción del producto" /></td>
        <td><input type="number" min="0" value="0" oninput="calcular()" /></td>
        <td style="text-align:right" class="subtotal">0,00</td>
        <td><button class="btn-remove" onclick="this.closest('tr').remove();calcular()">×</button></td>
      `;
      document.getElementById('items').appendChild(tr);
      calcular();
    }

    function calcular() {
      let total = 0;
      document.querySelectorAll('#items tr').forEach(tr => {
        const cant = parseFloat(tr.cells[0].querySelector('input').value) || 0;
        const precio = parseFloat(tr.cells[3].querySelector('input').value) || 0;
        const sub = cant * precio;
        tr.querySelector('.subtotal').textContent = formatear(sub);
        total += sub;
      });
      document.getElementById('total').textContent = formatear(total);
    }

    function formatear(n) {
      return n.toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function enviarWpp() {
      const fecha = document.getElementById('fecha').textContent;
      const num = document.getElementById('num').textContent;
      let msg = `*FERRETERÍA JAVIER*\nPresupuesto N° ${num} - ${fecha}\n\n`;
      document.querySelectorAll('#items tr').forEach(tr => {
        const cant = tr.cells[0].querySelector('input').value;
        const unit = tr.cells[1].querySelector('select').value;
        const desc = tr.cells[2].querySelector('input').value;
        const precio = parseFloat(tr.cells[3].querySelector('input').value) || 0;
        const sub = (parseFloat(cant) || 0) * precio;
        if (desc) msg += `• ${cant} ${unit} ${desc} → $${formatear(sub)}\n`;
      });
      msg += `\n*TOTAL: $${document.getElementById('total').textContent}*`;
      window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
    }

    agregarItem();
    agregarItem();
  </script>
</body>
</html>
